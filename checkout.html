<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تأكيد الطلب - شركة المصطفى</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      background-color: #111;
      color: #fff;
      margin: 0;
      padding: 0;
    }
    .logo {
      display: block;
      margin: 10px auto;
      max-width: 220px;
      border-radius: 20px;
      animation: bounceIn 1s ease-out, pulse 2s 2s ease-in-out infinite;
      transform-origin: center;
      transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .logo:hover {
      transform: scale(1.05) rotate(2deg);
    }
    .container {
      max-width: 800px;
      margin: 20px auto;
      padding: 20px;
    }
    h1 {
      color: yellow;
      text-align: center;
    }
    .order-summary {
      background-color: #222;
      border: 1px solid yellow;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 20px;
    }
    .order-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #444;
    }
    .customer-form {
      background-color: #222;
      border: 1px solid yellow;
      border-radius: 10px;
      padding: 20px;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      color: yellow;
    }
    input, textarea {
      width: 100%;
      padding: 10px;
      border-radius: 5px;
      border: none;
      background-color: #333;
      color: white;
    }
    .submit-btn {
      background-color: yellow;
      color: black;
      border: none;
      padding: 12px 20px;
      border-radius: 5px;
      font-weight: bold;
      font-size: 18px;
      margin-top: 20px;
      cursor: pointer;
      width: 100%;
    }
    .back-btn {
      background-color: #444;
      color: white;
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
      margin-top: 10px;
      cursor: pointer;
    }

    .back-btn1 {
      position: fixed;
      top: 20px;
      right: 20px;
      background-color: #0d47a1;
      color: white;
      padding: 10px 16px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      z-index: 1000;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      transition: background 0.3s ease;
    }

    .back-btn1:hover {
      background-color: #1565c0;
    }
  </style>
  <style>
    input,
    textarea,
    select {
      font-size: 16px; /* يمنع الزوم على الموبايل */
    }
  </style>

  <style>
    /* خط عربي أنيق */
    @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');

    /* تنسيق التنبيه */
    .swal-responsive {
      direction: rtl;
      text-align: right;
      font-family: 'Tajawal', sans-serif;
      font-size: 16px;
      border-radius: 10px;
      padding: 10px;
      width: 90% !important;
      max-width: 500px !important;
      box-sizing: border-box;
    }

    /* عنوان جذاب */
    .swal-title {
      font-weight: bold;
      font-size: 20px;
      color: #d97706;
    }

    /* زر متجاوب */
    .swal-button {
      background-color: #f59e0b !important;
      color: white !important;
      border: none !important;
      border-radius: 6px !important;
      font-size: 15px !important;
      padding: 10px 25px !important;
      width: 100%;
      max-width: 100px;
      margin: 0 auto;
      display: block;
    }

    .swal-button:hover {
      background-color: #d97706 !important;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
  
  <header>
    <img src="img/zz.jpg" alt="شعار الشركة" class="logo" />
    <p style="text-align:center;">شركة المصطفى لتصنيع اللحوم وبيع جميع منتجات الشركات</p>
  </header>
  <a href="cart.html" class="back-btn1">← رجوع</a>
  
  <div class="container">
    <h1>تأكيد الطلب</h1>

    <div class="order-summary">
      <h2>ملخص الطلب</h2>
      <div id="order-items"><!-- يتم ملؤه تلقائيًا --></div>
      <div style="text-align: right; margin-top: 15px; font-weight: bold;">
        الإجمالي: <span id="order-total">0</span> جنيهاً
      </div>
    </div>

    <div class="customer-form">
      <h2>معلومات العميل</h2>
      <form id="customer-info-form">
        <div class="form-group">
          <label for="name">الاسم بالكامل*</label>
          <input type="text" id="name" required>
        </div>
        <div class="form-group">
          <label for="phone">رقم الهاتف*</label>
          <input type="tel" id="phone" required>
        </div>
        <div class="form-group">
          <label for="address">العنوان (اختياري)</label>
          <textarea id="address" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label for="notes">ملاحظات إضافية (اختياري)</label>
          <textarea id="notes" rows="3"></textarea>
        </div>
        <button type="submit" class="submit-btn">تأكيد الطلب</button>
        <button type="button" class="back-btn" onclick="window.location.href='cart.html'">العودة إلى السلة</button>
      </form>
    </div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <script>
    // ============================================
    // إعداد Firebase - مشروعين مختلفين
    // ============================================

    // المشروع الأول: للمنتجات (mostafa-products)
    const firebaseConfigProducts = {
      apiKey: "AIzaSyBKtxMNJ3n_YIsy671sbhlk8Qm1yt5uSB4",
      authDomain: "mostafa-products.firebaseapp.com",
      projectId: "mostafa-products",
      storageBucket: "mostafa-products.firebasestorage.app",
      messagingSenderId: "841270845665",
      appId: "1:841270845665:web:f2f857112688b8b8be57a0"
    };

    // المشروع الثاني: للأوردرات (pricelistofelmostafa)
    const firebaseConfigOrders = {
      apiKey: "AIzaSyCR_9LTEVlFMnYhGT5JaqR2hG2lu06D9Ow",
      authDomain: "pricelistofelmostafa.firebaseapp.com",
      projectId: "pricelistofelmostafa",
      storageBucket: "pricelistofelmostafa.firebasestorage.app",
      messagingSenderId: "39463931277",
      appId: "1:39463931277:web:02cc42fc88508696b501c4"
    };

    // تهيئة التطبيق الأول للمنتجات
    const appProducts = firebase.initializeApp(firebaseConfigProducts, "products");
    const dbProducts = firebase.firestore(appProducts);

    // تهيئة التطبيق الثاني للأوردرات
    const appOrders = firebase.initializeApp(firebaseConfigOrders, "orders");
    const dbOrders = firebase.firestore(appOrders);

    // ============================================
    // متغيرات مساعدة لمنع الازدواجية
    // ============================================
    let isProcessing = false; // لمنع الضغط المتكرر
    let currentOrderId = null; // لتتبع الأوردر الحالي

    // ============================================
    // عرض محتويات الطلب
    // ============================================
    function displayOrderSummary() {
      const cart = JSON.parse(localStorage.getItem('cart')) || [];
      const container = document.getElementById('order-items');
      let total = 0;
      container.innerHTML = '';

      if (cart.length === 0) {
        container.innerHTML = '<p>لا توجد عناصر في الطلب</p>';
        document.getElementById('order-total').textContent = '0';
        return;
      }

      cart.forEach(item => {
        const itemDiv = document.createElement('div');
        itemDiv.className = 'order-item';
        itemDiv.innerHTML = `
          <span>${item.name} (${item.quantity} × ${item.price} ج)</span>
          <span>${(item.quantity * item.price).toFixed(2)} ج</span>
        `;
        container.appendChild(itemDiv);
        total += item.quantity * item.price;
      });

      document.getElementById('order-total').textContent = total.toFixed(2);
    }

    // ============================================
    // ملء بيانات المستخدم إذا كان مسجلاً دخول
    // ============================================
    function fillUserData() {
      const user = JSON.parse(localStorage.getItem('user'));
      if (user) {
        document.getElementById('name').value = user.name || '';
        document.getElementById('phone').value = user.phone || '';
        document.getElementById('address').value = user.address || '';
      }
    }

    // ============================================
    // دالة خصم المخزون من قاعدة المنتجات
    // ============================================
    function deductStockFromFirebase(cartItems) {
      const batch = dbProducts.batch();
      const updatePromises = [];
      
      cartItems.forEach(item => {
        const productRef = dbProducts.collection("products").doc(item.id);
        updatePromises.push(
          productRef.get().then(doc => {
            if (doc.exists) {
              const productData = doc.data();
              
              // إذا كان المنتج عليه "الشغل علي المكشوف"، لا نخصم من المخزون
              if (productData.unlimitedStock) {
                console.log(`♾️ المنتج ${item.name} عليه الشغل علي المكشوف - لم يتم خصم المخزون`);
                return;
              }
              
              const currentStock = productData.stock || 0;
              const newStock = currentStock - item.quantity;
              
              if (newStock < 0) {
                throw new Error(`لا يوجد مخزون كافي للمنتج: ${item.name}`);
              }
              
              batch.update(productRef, { stock: newStock });
              console.log(`📉 خصم ${item.quantity} من مخزون ${item.name}. المخزون الجديد: ${newStock}`);
            }
          })
        );
      });
      
      return Promise.all(updatePromises)
        .then(() => batch.commit())
        .then(() => {
          console.log("✅ تم خصم المخزون بنجاح من قاعدة المنتجات");
          return true;
        })
        .catch(error => {
          console.error("❌ فشل في خصم المخزون:", error);
          throw error;
        });
    }

    // ============================================
    // دالة التحقق من الطلبات السابقة غير المكتملة
    // ============================================
    function checkPendingOrders(phone, cartItems) {
      return dbOrders.collection('orders')
        .where('customerPhone', '==', phone)
        .where('status', 'in', ['جديد', 'قيد المعالجة'])
        .get()
        .then(querySnapshot => {
          const pendingItems = {};
          
          // جمع كل المنتجات في الطلبات السابقة
          querySnapshot.forEach(doc => {
            const orderData = doc.data();
            orderData.items.forEach(item => {
              if (!pendingItems[item.id]) {
                pendingItems[item.id] = 0;
              }
              pendingItems[item.id] += item.quantity;
            });
          });
          
          // التحقق من عدم تجاوز الحد الأقصى مع الطلبات السابقة
          const promises = [];
          cartItems.forEach(item => {
            const promise = dbProducts.collection("products").doc(item.id).get()
              .then(productDoc => {
                if (productDoc.exists) {
                  const productData = productDoc.data();
                  const totalRequested = (pendingItems[item.id] || 0) + item.quantity;
                  
                  if (productData.maxOrder > 0 && totalRequested > productData.maxOrder) {
                    throw new Error(`لقد تجاوزت الحد الأقصى للطلب من ${item.name}. الحد الأقصى المسموح: ${productData.maxOrder} وحدة (لديك ${pendingItems[item.id] || 0} وحدة في الطلبات السابقة)`);
                  }
                }
              });
            promises.push(promise);
          });
          
          return Promise.all(promises);
        });
    }

    // ============================================
    // دالة إنشاء أوردر جديد في قاعدة الأوردرات
    // ============================================
    function createNewOrder(name, phone, address, notes, cart, total, user) {
      // منع الازدواجية: تحقق إذا كان هناك أوردر حديث لنفس الهاتف
      const orderKey = `order_${phone}_${Date.now()}`;
      const recentOrderKey = localStorage.getItem('recent_order_key');
      
      if (recentOrderKey && recentOrderKey === orderKey) {
        throw new Error('لقد أرسلت هذا الطلب بالفعل. يرجى الانتظار قليلاً.');
      }
      
      const order = {
        customerName: name,
        customerPhone: phone,
        customerAddress: address || 'غير محدد',
        notes: notes || 'لا توجد ملاحظات',
        items: cart,
        total: total,
        status: 'جديد',
        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
        userId: user?.id || null,
        orderKey: orderKey // إضافة مفتاح فريد لمنع الازدواجية
      };

      // حفظ الأوردر في قاعدة البيانات الثانية (pricelistofelmostafa)
      return dbOrders.collection('orders').add(order)
        .then(docRef => {
          console.log("✅ تم حفظ الأوردر في قاعدة pricelistofelmostafa، المعرف:", docRef.id);
          localStorage.setItem('recent_order_key', orderKey);
          currentOrderId = docRef.id;
          return docRef.id;
        });
    }

    // ============================================
    // دالة دمج الأوردرات في حالة وجود طلب سابق
    // ============================================
    function mergeOrders(querySnapshot, name, phone, address, notes, newCart, newTotal, user) {
      const existingOrder = querySnapshot.docs[0];
      const existingData = existingOrder.data();
      
      // منع الدمج المتكرر: تحقق إذا كانت هذه العناصر تمت إضافتها بالفعل
      const orderMergeKey = `merge_${existingOrder.id}_${Date.now()}`;
      const lastMergeKey = localStorage.getItem('last_merge_key');
      
      if (lastMergeKey && lastMergeKey.startsWith(`merge_${existingOrder.id}_`)) {
        const timeDiff = Date.now() - parseInt(lastMergeKey.split('_')[2]);
        if (timeDiff < 30000) { // 30 ثانية
          throw new Error('تم تحديث طلبك بالفعل. يرجى الانتظار قليلاً.');
        }
      }
      
      const mergedItems = [...existingData.items];
      let itemsChanged = false;
      
      newCart.forEach(newItem => {
        const existingItemIndex = mergedItems.findIndex(item => item.id === newItem.id);
        if (existingItemIndex >= 0) {
          // التحقق من عدم وجود ازدواجية في الكمية
          if (mergedItems[existingItemIndex].quantity !== newItem.quantity) {
            mergedItems[existingItemIndex].quantity += newItem.quantity;
            itemsChanged = true;
          }
        } else {
          mergedItems.push(newItem);
          itemsChanged = true;
        }
      });
      
      // إذا لم يتغير شيء، لا تقم بالتحديث
      if (!itemsChanged && existingData.customerName === name) {
        console.log("⚠️ لا يوجد تغييرات في الطلب، تخطي التحديث");
        return Promise.resolve(existingOrder.id);
      }
      
      const mergedTotal = existingData.total + newTotal;
      
      // تحديث الأوردر في قاعدة البيانات الثانية
      return existingOrder.ref.update({
        items: mergedItems,
        total: mergedTotal,
        customerName: name,
        customerAddress: address || existingData.customerAddress,
        notes: notes || existingData.notes,
        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
        lastUpdate: new Date().toISOString()
      })
      .then(() => {
        console.log("✅ تم تحديث الأوردر في قاعدة pricelistofelmostafa");
        localStorage.setItem('last_merge_key', orderMergeKey);
        currentOrderId = existingOrder.id;
        return existingOrder.id;
      });
    }

    // ============================================
    // دالة إرسال الطلب الرئيسية
    // ============================================
    function submitOrder(event) {
      event.preventDefault();
      
      // منع الضغط المتكرر على الزر
      if (isProcessing) {
        Swal.fire({
          title: '⏳ يرجى الانتظار',
          text: 'جاري معالجة طلبك السابق...',
          icon: 'info',
          confirmButtonText: 'حسناً',
          customClass: {
            popup: 'swal-responsive',
            title: 'swal-title',
            confirmButton: 'swal-button'
          }
        });
        return;
      }
      
      isProcessing = true;
      const submitBtn = document.querySelector('.submit-btn');
      submitBtn.disabled = true;
      submitBtn.textContent = 'جاري المعالجة...';
      
      const cart = JSON.parse(localStorage.getItem('cart')) || [];

      if (cart.length === 0) {
        Swal.fire({
          title: '⚠️ تنبيه',
          text: 'سلة التسوق فارغة!',
          icon: 'warning',
          confirmButtonText: 'حسناً',
          customClass: {
            popup: 'swal-responsive',
            title: 'swal-title',
            confirmButton: 'swal-button'
          }
        });
        isProcessing = false;
        submitBtn.disabled = false;
        submitBtn.textContent = 'تأكيد الطلب';
        return;
      }

      const name = document.getElementById('name').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const address = document.getElementById('address').value.trim();
      const notes = document.getElementById('notes').value.trim();

      if (!name || !phone) {
        Swal.fire({
          title: '⚠️ تنبيه',
          text: 'الرجاء إدخال الاسم ورقم الهاتف',
          icon: 'warning',
          confirmButtonText: 'حسناً',
          customClass: {
            popup: 'swal-responsive',
            title: 'swal-title',
            confirmButton: 'swal-button'
          }
        });
        isProcessing = false;
        submitBtn.disabled = false;
        submitBtn.textContent = 'تأكيد الطلب';
        return;
      }

      const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
      const user = JSON.parse(localStorage.getItem('user'));

      // الخطوة 1: التحقق من الطلبات السابقة
      checkPendingOrders(phone, cart)
        .then(() => {
          // الخطوة 2: البحث عن طلب سابق
          return dbOrders.collection('orders')
            .where('customerPhone', '==', phone)
            .where('status', 'in', ['جديد', 'قيد المعالجة'])
            .get();
        })
        .then(querySnapshot => {
          let orderPromise;
          
          if (querySnapshot.empty) {
            // الخطوة 3: خصم المخزون
            return deductStockFromFirebase(cart)
              .then(() => {
                // الخطوة 4: إنشاء أوردر جديد
                return createNewOrder(name, phone, address, notes, cart, total, user);
              });
          } else {
            // الخطوة 3: خصم المخزون
            return deductStockFromFirebase(cart)
              .then(() => {
                // الخطوة 4: دمج مع الطلب السابق
                return mergeOrders(querySnapshot, name, phone, address, notes, cart, total, user);
              });
          }
        })
        .then(orderId => {
          console.log("🎉 تمت معالجة الطلب بنجاح، معرف الأوردر:", orderId);
          
          // عرض رسالة النجاح
          Swal.fire({
            icon: 'success',
            title: 'تم تأكيد طلبك بنجاح!',
            html: `
              <div style="text-align: right; direction: rtl;">
                
                <p>💰 إجمالي الطلب: <strong>${total.toFixed(2)} جنيهاً</strong></p>
                <p style="color: #f59e0b; font-weight: bold; margin-top: 15px;">
                  ⚠️ ملاحظة: في حالة أن طلبك أقل من 3000 جنيه، سيتم إضافة 70 جنيه رسوم توصيل.
                </p>
                <p style="font-size: 14px; margin-top: 10px;">
                  رقم الطلب: <strong>${orderId}</strong>
                </p>
              </div>
            `,
            showConfirmButton: true,
            confirmButtonText: 'حسناً',
            customClass: {
              popup: 'swal-responsive',
              title: 'swal-title',
              confirmButton: 'swal-button'
            }
          }).then(() => {
            // مسح السلة والانتقال للصفحة الرئيسية
            localStorage.removeItem('cart');
            localStorage.removeItem('recent_order_key'); // تنظيف المفتاح المؤقت
            window.location.href = 'index.html';
          });
        })
        .catch(error => {
          console.error('❌ خطأ في معالجة الطلب:', error);
          
          let errorMessage = 'حدث خطأ أثناء معالجة الطلب، يرجى المحاولة مرة أخرى';
          
          if (error.message.includes('لا يوجد مخزون')) {
            errorMessage = error.message;
          } else if (error.message.includes('تجاوزت الحد الأقصى')) {
            errorMessage = error.message;
          } else if (error.message.includes('أرسلت هذا الطلب')) {
            errorMessage = error.message;
          } else if (error.message.includes('تم تحديث طلبك')) {
            errorMessage = error.message;
          }
          
          Swal.fire({
            title: '❌ خطأ',
            text: errorMessage,
            icon: 'error',
            confirmButtonText: 'حسناً',
            customClass: {
              popup: 'swal-responsive',
              title: 'swal-title',
              confirmButton: 'swal-button'
            }
          });
        })
        .finally(() => {
          // إعادة تمكين الزر
          isProcessing = false;
          submitBtn.disabled = false;
          submitBtn.textContent = 'تأكيد الطلب';
        });
    }

    // ============================================
    // تهيئة الصفحة
    // ============================================
    document.addEventListener('DOMContentLoaded', () => {
      displayOrderSummary();
      fillUserData();
      document.getElementById('customer-info-form').addEventListener('submit', submitOrder);
      
      // تنظيف المفاتيح المؤقتة القديمة
      const now = Date.now();
      const recentOrderKey = localStorage.getItem('recent_order_key');
      if (recentOrderKey) {
        const keyTime = parseInt(recentOrderKey.split('_')[2]);
        if (now - keyTime > 300000) { // 5 دقائق
          localStorage.removeItem('recent_order_key');
        }
      }
      
      const lastMergeKey = localStorage.getItem('last_merge_key');
      if (lastMergeKey) {
        const keyTime = parseInt(lastMergeKey.split('_')[2]);
        if (now - keyTime > 300000) { // 5 دقائق
          localStorage.removeItem('last_merge_key');
        }
      }
    });
  </script>
</body>
</html>
