<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>تحت الصيانة</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: "Cairo", Arial, sans-serif;
      background: linear-gradient(135deg, #1a1a1a, #333);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      background: rgba(255,255,255,0.05);
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      max-width: 400px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 20px;
      color: #ffcc00;
    }

    p {
      font-size: 18px;
      line-height: 1.6;
    }

    .date {
      margin-top: 20px;
      font-size: 22px;
      color: #00ffcc;
      font-weight: bold;
    }

    .footer {
      margin-top: 25px;
      font-size: 14px;
      color: #aaa;
    }

    .loader {
      margin: 25px auto;
      border: 5px solid #444;
      border-top: 5px solid #ffcc00;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>🚧 الموقع تحت الصيانة</h1>
    
    <p>
      بنقوم حالياً ببعض التحديثات لتحسين الخدمة ليكم 🙏
    </p>

    <div class="loader"></div>

    <div class="date">
      هنرجع نشتغل يوم التلات إن شاء الله
    </div>

    <div class="footer">
      شكراً لصبركم ❤️
    </div>
  </div>

</body>
</html>
